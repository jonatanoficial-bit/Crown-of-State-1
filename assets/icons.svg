<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sprites de ícones simples para a interface do jogo.
  Cada <symbol> pode ser utilizado através de <use href="assets/icons.svg#id"></use>.
  Ícones minimalistas criados manualmente para evitar dependências externas.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display: none">
  <!-- Ícone do Gabinete do Presidente: cabeça e ombros -->
  <symbol id="president" viewBox="0 0 24 24">
    <circle cx="12" cy="8" r="4" />
    <path d="M4 22c0-4.5 4-7 8-7s8 2.5 8 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </symbol>

  <!-- Ícone da Reunião Ministerial: duas cabeças -->
  <symbol id="meeting" viewBox="0 0 24 24">
    <circle cx="8" cy="8" r="3" />
    <circle cx="16" cy="8" r="3" />
    <path d="M2 22c0-4 3.5-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    <path d="M16 16c2.5 0 6 2 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  </symbol>

  <!-- Ícone de Comércio/Finanças: cofre com moeda -->
  <symbol id="finance" viewBox="0 0 24 24">
    <rect x="3" y="7" width="18" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2" />
    <circle cx="12" cy="14" r="3" fill="none" stroke="currentColor" stroke-width="2" />
    <path d="M12 7V5h4" fill="none" stroke="currentColor" stroke-width="2" />
  </symbol>

  <!-- Ícone do Departamento Militar: escudo estilizado -->
  <symbol id="military" viewBox="0 0 24 24">
    <path d="M12 2l8 4v7c0 6-4 9-8 10-4-1-8-4-8-10V6l8-4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
  </symbol>

  <!-- Ícone genérico para decisões (ponto de exclamação) -->
  <symbol id="decision" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
    <line x1="12" y1="8" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    <circle cx="12" cy="17" r="1" fill="currentColor" />
  </symbol>
</svg>